name: Deploy Friday AI

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install Node
        run: |
          cd frontend
          npm install
          npm run build

      - name: Deploy Vercel
        run: npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }}
